<div class="user-detail">
  <h2>User Details</h2>
  <form (ngSubmit)="save()">
    <div class="form-group">
      <input type="text" [(ngModel)]="user.name" name="name" placeholder="Full name">
    </div>
    <div class="form-group">
      <input type="email" [(ngModel)]="user.email" name="email" placeholder="Email address">
    </div>
    <div class="form-group">
      <select [(ngModel)]="user.role" name="role">
        <option value="admin">Administrator</option>
        <option value="user">Standard User</option>
        <option value="viewer">Viewer</option>
      </select>
    </div>
    <button type="submit" style="background: #2ecc71; color: white; padding: 10px 24px; border: none; border-radius: 4px; font-size: 16px;">
      Save Changes
    </button>
    <button type="button" (click)="cancel()" style="background: #95a5a6; color: white; padding: 10px 24px; border: none; border-radius: 4px; margin-left: 12px;">
      Cancel
    </button>
  </form>
</div>

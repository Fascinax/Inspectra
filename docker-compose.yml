version: "3.8"

services:
  inspectra:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app:ro
      - /app/node_modules
    working_dir: /app
    command: node mcp/dist/index.js
    stdin_open: true
    environment:
      - NODE_ENV=development
      - INSPECTRA_LOG_LEVEL=info



name: Publish Audit Report

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Repository to audit (owner/repo or local path)"
        required: true
        type: string
      profile:
        description: "Policy profile to use"
        required: true
        type: choice
        options:
          - generic
          - java-angular-playwright
          - java-backend
          - angular-frontend
        default: generic

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build MCP server
        run: npm run build

      - name: Run tests before audit
        run: npm test

      - name: Generate audit report (Markdown)
        run: |
          node mcp/dist/cli/audit.js . \
            --profile=${{ inputs.profile }} \
            --format=markdown \
            --output=audit-report.md
        env:
          NODE_ENV: production

      - name: Generate audit report (SARIF)
        run: |
          node mcp/dist/cli/audit.js . \
            --profile=${{ inputs.profile }} \
            --format=sarif \
            --output=audit-report.sarif

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: audit-report.sarif
          category: inspectra

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: inspectra-audit-report
          path: |
            audit-report.md
            audit-report.sarif
          retention-days: 30

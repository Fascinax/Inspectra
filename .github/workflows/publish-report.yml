name: Publish Audit Report

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Repository to audit (owner/repo or local path)"
        required: true
        type: string
      profile:
        description: "Policy profile to use"
        required: true
        type: choice
        options:
          - generic
          - java-angular-playwright
          - java-backend
          - angular-frontend
        default: generic

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build MCP server
        run: npm run build

      - name: Run tests before audit
        run: npm test

      - name: Generate audit report
        run: |
          echo "# Inspectra Audit Report" > audit-report.md
          echo "" >> audit-report.md
          echo "**Target:** ${{ inputs.target_repo }}" >> audit-report.md
          echo "**Profile:** ${{ inputs.profile }}" >> audit-report.md
          echo "**Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> audit-report.md
          echo "" >> audit-report.md
          echo "> This report was generated by Inspectra. Run the audit-orchestrator agent in Copilot Chat for full results." >> audit-report.md

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: inspectra-audit-report
          path: audit-report.md
          retention-days: 30
